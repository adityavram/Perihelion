[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    small: Small semiprime tests (< 10000) - always run
    medium: Medium semiprime tests (~10^6 range)
    production: RSA-sized semiprime tests (production-level)
    slow: Slow-running tests